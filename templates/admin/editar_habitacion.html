<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Editar habitación — Motta And Hotels Admin.">
  <title>Editar Habitación | Motta And Hotels Admin</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='estilos.css') }}">
</head>
<body>

<div class="admin-topbar">
  <div class="admin-topbar__logo">Motta And Hotels</div>
  <div class="admin-topbar__links">
    <a href="/admin/dashboard">📊</a>
    <a href="/admin/habitaciones">🛏️</a>
    <a href="/admin/reservas">📅</a>
    <a href="/">🌐</a>
  </div>
</div>

<div class="admin-wrap">
  <aside class="sidebar">
    <div class="sidebar__logo">Motta And Hotels</div>
    <div class="sidebar__tagline">Panel Administrativo</div>
    <nav class="sidebar__nav">
      <a href="/admin/dashboard"><span class="icon">📊</span> Dashboard</a>
      <a href="/admin/habitaciones" class="active"><span class="icon">🛏️</span> Habitaciones</a>
      <a href="/admin/reservas"><span class="icon">📅</span> Reservas</a>
      <a href="/admin/nueva_habitacion"><span class="icon">➕</span> Nueva Habitación</a>
    </nav>
    <div class="sidebar__footer">
      <a href="/"><span>🌐</span> Ver sitio</a>
      <a href="/admin/login" style="color:var(--danger);"><span>🚪</span> Cerrar sesión</a>
    </div>
  </aside>

  <main class="admin-main">
    <div class="admin-header">
      <div>
        <h1 class="admin-title">Editar Habitación</h1>
        <p class="admin-subtitle">ID: #{{ id }} · Modificar datos de la habitación</p>
      </div>
      <a href="/admin/habitaciones" class="btn btn-outline btn-sm">← Volver al listado</a>
    </div>

    <div class="admin-card" style="padding:44px; max-width:720px;">
      <form id="form-editar-hab" action="/admin/editar_habitacion/{{ id }}" method="POST">
        <div class="form-grid">
          <div class="form-group">
            <label for="nombre-edit">Nombre de la Habitación</label>
            <input id="nombre-edit" class="form-control" type="text" name="nombre" value="{{ habitacion.nombre if habitacion else 'Suite Imperial' }}" required>
          </div>
          <div class="form-group">
            <label for="tipo-edit">Tipo de Habitación</label>
            <select id="tipo-edit" class="form-control" name="tipo">
              <option value="estandar" {{ 'selected' if habitacion and habitacion.tipo == 'estandar' else '' }}>Estándar</option>
              <option value="ejecutiva" {{ 'selected' if habitacion and habitacion.tipo == 'ejecutiva' else '' }}>Ejecutiva</option>
              <option value="familiar" {{ 'selected' if habitacion and habitacion.tipo == 'familiar' else '' }}>Familiar</option>
              <option value="suite" {{ 'selected' if habitacion and habitacion.tipo == 'suite' else '' }}>Suite</option>
              <option value="suite_premium" {{ 'selected' if habitacion and habitacion.tipo == 'suite_premium' else '' }}>Suite Premium</option>
            </select>
          </div>
          <div class="form-group">
            <label for="capacidad-edit">Capacidad (personas)</label>
            <input id="capacidad-edit" class="form-control" type="number" name="capacidad" min="1" max="10" value="{{ habitacion.capacidad if habitacion else '4' }}" required>
          </div>
          <div class="form-group">
            <label for="precio-edit">Precio por Noche ($)</label>
            <input id="precio-edit" class="form-control" type="number" step="0.01" name="precio_noche" value="{{ habitacion.precio_noche if habitacion else '450.00' }}" required>
          </div>
          <div class="form-group">
            <label for="piso-edit">Piso</label>
            <input id="piso-edit" class="form-control" type="number" name="piso" min="1" max="20" value="{{ habitacion.piso if habitacion and habitacion.piso else '' }}">
          </div>
          <div class="form-group">
            <label for="estado-edit">Estado</label>
            <select id="estado-edit" class="form-control" name="disponible">
              <option value="1" {{ 'selected' if habitacion and habitacion.disponible else '' }}>Disponible</option>
              <option value="0" {{ 'selected' if habitacion and not habitacion.disponible else '' }}>No disponible</option>
            </select>
          </div>
          <div class="form-group form-group--full">
            <label for="amenidades-edit">Amenidades</label>
            <input id="amenidades-edit" class="form-control" type="text" name="amenidades" value="{{ habitacion.amenidades if habitacion and habitacion.amenidades else '' }}" placeholder="WiFi, A/C, Minibar, Smart TV...">
          </div>
          <div class="form-group form-group--full">
            <label for="desc-edit">Descripción</label>
            <textarea id="desc-edit" class="form-control" name="descripcion" rows="4">{{ habitacion.descripcion if habitacion else 'Habitación premium con todas las comodidades.' }}</textarea>
          </div>
        </div>
        <div class="form-actions" style="margin-top:32px;">
          <button id="btn-actualizar-hab" type="submit" class="btn btn-gold">Guardar Cambios</button>
          <a href="/admin/habitaciones" class="btn btn-outline">Cancelar</a>
          <a href="#" class="btn btn-danger btn-sm" style="margin-left:auto;" onclick="return confirm('¿Está seguro de eliminar esta habitación?')">Eliminar Habitación</a>
        </div>
      </form>
    </div>
  </main>
</div>
</body>
</html>
