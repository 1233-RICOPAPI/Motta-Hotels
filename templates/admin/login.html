<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Acceso al panel administrativo — Motta And Hotels Hotel & Spa.">
  <title>Acceso Admin | Motta And Hotels</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='estilos.css') }}">
</head>
<body>
  
  <div class="page-login">
    <div class="login-card animate-fade-up">
      <div class="login-card__logo">Motta And Hotels</div>
      <p class="login-card__desc">Acceso al Panel Administrativo</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for cat, msg in messages %}
            <div class="badge badge--{{ 'red' if cat == 'error' else 'green' }}" style="display:flex; justify-content:center; padding:10px; margin-bottom: 20px; text-align:center;">
              {{ msg }}
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form action="/admin/login" method="POST" style="text-align:left;">
        <div class="form-group" style="margin-bottom: 16px;">
          <label for="usuario">Usuario</label>
          <input id="usuario" class="form-control" type="text" name="usuario" placeholder="admin" required autocomplete="username">
        </div>
        
        <div class="form-group" style="margin-bottom: 24px;">
          <label for="password">Contraseña</label>
          <input id="password" class="form-control" type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        
        <button type="submit" class="btn btn-gold" style="width: 100%; padding: 14px;">Ingresar al Sistema</button>
      </form>
      
      <div style="margin-top: 30px; border-top: 1px solid #F3F4F6; padding-top: 20px;">
        <a href="/" style="font-size: 0.85rem; color: var(--text-muted); font-weight: 500;">&larr; Volver al sitio web</a>
      </div>
    </div>
  </div>

</body>
</html>
